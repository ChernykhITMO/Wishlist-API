version: "2"

run:
  timeout: 3m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused

linters-settings:
  revive:
    rules:
      - name: var-naming
      - name: line-length-limit
        arguments: [120]

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck